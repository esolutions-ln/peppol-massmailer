server {
    listen 80;
    server_name _;
    client_max_body_size 200m;

    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
