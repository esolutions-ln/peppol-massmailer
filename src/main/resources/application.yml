server:
  port: ${SERVER_PORT:9199}

app:
  base-url: ${APP_BASE_URL:https://ap.invoicedirect.biz}

spring:
  application:
    name: mass-mailer-service

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  threads:
    virtual:
      enabled: true

  mail:
    host: ${SPRING_MAIL_HOST:smtp-relay.brevo.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:af02a6001@smtp-brevo.com}
    # No default — must be set in env (.env / k8s secret). Startup fails fast otherwise.
    password: ${SPRING_MAIL_PASSWORD:?SPRING_MAIL_PASSWORD environment variable is required}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        from: ${SPRING_MAIL_PROPERTIES_MAIL_FROM:no-reply@invoicedirect.biz}
    test-connection: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/massmailer}
    username: ${DB_USER:mailer}
    # No default — production must provide DB_PASS; startup fails fast otherwise.
    password: ${DB_PASS:?DB_PASS environment variable is required}

  jpa:
    hibernate:
      # "validate" prevents accidental schema drift; override to "update" for local dev.
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: true

massmailer:
  from-address: ${MAIL_FROM_ADDRESS:no-reply@invoicedirect.biz}
  from-name: ${MAIL_FROM_NAME:InvoiceDirect Mailer}
  rate-limit: ${RATE_LIMIT:100}
  batch-size: ${BATCH_SIZE:50}
  max-retries: 3
  retry-backoff: 2000
  fiscal-validation-enabled: true
  # Defence-in-depth path-traversal allowlist for file-path PDFs.
  # Leave blank to disable file-path PDF resolution (forces Base64 mode).
  pdf-inbox-base-path: ${PDF_INBOX_BASE:/var/lib/invoicedirect/invoices}
  # Hard cap on decoded PDF size — protects against OOM via large Base64 payloads.
  max-pdf-bytes: ${MAX_PDF_BYTES:10485760}   # 10 MB
  gmail-oauth2:
    enabled: false
  # Brevo (Sendinblue) transactional email — when enabled, outbound mail is
  # delivered via Brevo's HTTPS API instead of Spring's JavaMailSender.
  brevo:
    enabled: ${BREVO_ENABLED:false}
    api-key: ${BREVO_API_KEY:}
    base-url: ${BREVO_BASE_URL:https://api.brevo.com/v3}
    timeout-seconds: ${BREVO_TIMEOUT_SECONDS:30}

webhook:
  # No default — production must provide a strong secret (>=32 chars).
  secret: ${WEBHOOK_SECRET:?WEBHOOK_SECRET environment variable is required (>=32 chars)}

pdf-watcher:
    # Set PDF_WATCHER_ENABLED=true and configure inbox-directory to activate.
    # Each PDF in the inbox must have a companion {invoiceNumber}.json sidecar.
    enabled: ${PDF_WATCHER_ENABLED:false}
    inbox-directory: ${PDF_WATCHER_INBOX:/var/lib/invoicedirect/inbox}
    # Optional: copy of every successfully dispatched PDF is placed here.
    # The originating ERP/print system can poll this folder as a "sent" confirmation.
    # Leave blank or unset to disable.
    emailed-directory: ${PDF_WATCHER_EMAILED:/var/lib/invoicedirect/emailed}
    default-organization-id: ${PDF_WATCHER_ORG_ID:}

admin:
  username: ${ADMIN_USERNAME:admin}
  # No default — bootstrap admin password must be provided by env. Fail fast otherwise.
  password: ${ADMIN_PASSWORD:?ADMIN_PASSWORD environment variable is required}
  token-expiry-hours: ${ADMIN_TOKEN_EXPIRY_HOURS:8}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  health:
    mail:
      enabled: false

springdoc:
  # Swagger is OFF by default. Enable for dev with SWAGGER_ENABLED=true; never enable in prod.
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}
    tags-sorter: alpha
    operations-sorter: method
    try-it-out-enabled: true
    display-request-duration: true
    deep-linking: true
    default-models-expand-depth: 3
    default-model-expand-depth: 3
  paths-to-match:
    - /api/**
    - /peppol/**
    - /webhooks/**
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  swagger-ui-config:
    urls-primary-name: Mailer (PDF)

logging:
  level:
    com.esolutions.massmailer: DEBUG
    org.springframework.mail: DEBUG

erp:
  sage:
    base-url: ${SAGE_BASE_URL:}
    sender-id: ${SAGE_SENDER_ID:}
    sender-password: ${SAGE_SENDER_PASSWORD:}
    company-id: ${SAGE_COMPANY_ID:}
    user-id: ${SAGE_USER_ID:}
    user-password: ${SAGE_USER_PASSWORD:}
    # Sage Network e-Invoice API (for PEPPOL delivery status)
    network-base-url: ${SAGE_NETWORK_BASE_URL:}
    network-api-key: ${SAGE_NETWORK_API_KEY:}
    timeout-seconds: 30

  quickbooks:
    base-url: ${QB_BASE_URL:https://quickbooks.api.intuit.com/v3}
    client-id: ${QB_CLIENT_ID:}
    client-secret: ${QB_CLIENT_SECRET:}
    realm-id: ${QB_REALM_ID:}
    refresh-token: ${QB_REFRESH_TOKEN:}
    timeout-seconds: 30

  dynamics365:
    base-url: ${D365_BASE_URL:}
    tenant-id: ${D365_TENANT_ID:}
    client-id: ${D365_CLIENT_ID:}
    client-secret: ${D365_CLIENT_SECRET:}
    timeout-seconds: 30

  # ── Odoo (JSON-RPC / REST API) ──
  # Supports Odoo 14+ with API key authentication.
  # Set base-url to activate the adapter.
  # For Odoo.com SaaS: base-url = https://{your-db}.odoo.com
  # For self-hosted:   base-url = https://erp.yourcompany.com
  odoo:
    base-url: ${ODOO_BASE_URL:}
    database: ${ODOO_DATABASE:}
    username: ${ODOO_USERNAME:}
    api-key: ${ODOO_API_KEY:}
    timeout-seconds: 30
