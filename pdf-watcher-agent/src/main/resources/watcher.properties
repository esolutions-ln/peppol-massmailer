# ── InvoiceDirect PDF Watcher Agent Configuration ──
# Copy this file next to the JAR as watcher.properties
# and fill in your organization's API key.
#
# Platform paths:
#   Linux/macOS : /opt/invoicedirect/watcher
#   Windows     : C:\InvoiceDirect

# ── API Connection ──
api.base.url=https://ap.invoicedirect.biz
api.key=replace-with-your-org-api-key

# ── Organization (optional — used to validate sidecar org ID) ──
# organization.id=00000000-0000-0000-0000-000000000000

# ── Directories ──
# Linux/macOS defaults:
inbox.directory=/opt/invoicedirect/watcher/inbox
emailed.directory=/opt/invoicedirect/watcher/emailed
failed.directory=/opt/invoicedirect/watcher/failed
ledger.file=/opt/invoicedirect/watcher/ledger.json
#
# Windows alternatives (uncomment and adjust):
# inbox.directory=C:/InvoiceDirect/inbox
# emailed.directory=C:/InvoiceDirect/emailed
# failed.directory=C:/InvoiceDirect/failed
# ledger.file=C:/InvoiceDirect/ledger.json

# ── Timing ──
sidecar.wait.ms=3000
api.connect.timeout.seconds=10
api.read.timeout.seconds=60
